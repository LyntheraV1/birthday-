<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Ucapan Ulang Tahun 🎂</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
color:white;
}

/* card */
.card{
background:rgba(15,23,42,0.9);
padding:35px;
border-radius:20px;
text-align:center;
max-width:420px;
box-shadow:0 0 30px rgba(255,126,179,0.3);
z-index:2;
}

/* tombol */
button{
padding:10px 18px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#ff7eb3,#a78bfa);
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

#text{
margin-top:15px;
line-height:1.7;
}

/* ===== kue ulang tahun ===== */

.cake{
position:relative;
width:120px;
height:80px;
margin:20px auto;
}

.layer{
position:absolute;
width:120px;
height:40px;
background:#ff9ecf;
border-radius:10px;
bottom:0;
}

.layer.top{
height:30px;
background:#ffcce5;
bottom:35px;
}

/* lilin */

.candle{
position:absolute;
width:8px;
height:30px;
background:#fff;
top:-30px;
left:56px;
border-radius:3px;
}

.flame{
position:absolute;
width:10px;
height:14px;
background:orange;
border-radius:50%;
top:-12px;
left:-1px;
animation:flicker 0.2s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

/* confetti */

.confetti{
position:fixed;
width:8px;
height:12px;
top:-20px;
opacity:0.9;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
}
}

/* balon */

.balloon{
position:fixed;
bottom:-100px;
font-size:26px;
animation:floatUp linear forwards;
}

@keyframes floatUp{
to{transform:translateY(-120vh);}
}
</style>
</head>

<body>

<div class="card">

<h2>🎁 Ada sesuatu buat kamu</h2>

<div class="cake">

<div class="layer"></div>
<div class="layer top"></div>

<div class="candle">
<div class="flame" id="flame"></div>
</div>

</div>

<button onclick="start()">Buka Pelan-pelan ✨</button>
<button onclick="blowCandle()">Tiup Lilin 💨</button>

<div id="text"></div>

<button id="replyBtn" style="display:none" onclick="balas()">Balas 💌</button>

</div>

<audio id="song">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=happy-birthday-to-you-14299.mp3">
</audio>

<script>

/* teks */

const lines=[
"Kita make a wish di hari ulang tahunmu ini ya 🥳",
"",
"Semoga kamu selalu diberi kesehatan",
"dan hati yang tenang ✨",
"",
"Semoga kebahagiaan selalu menyertaimu 🤍",
"",
"Di usia yang baru ini",
"semoga kamu makin kuat dan sabar 💪",
"",
"Apa pun yang kamu impikan",
"pelan-pelan semoga terwujud 🌙",
"",
"Semangat terus kejar tujuanmu 🎯",
"Aku dukung dari jauh 😄",
"",
"Jangan lupa bersyukur ✨"
];

/* efek ketik */

let lineIndex=0;
let charIndex=0;

function start(){

document.getElementById("text").innerHTML="";
lineIndex=0;
charIndex=0;

document.getElementById("song").play();

spawnBalloons();

typeChar();
}

function typeChar(){

if(lineIndex>=lines.length){

document.getElementById("replyBtn").style.display="inline-block";
confettiBurst();
return;

}

let line=lines[lineIndex];

if(charIndex<line.length){

document.getElementById("text").innerHTML+=line.charAt(charIndex);

charIndex++;

setTimeout(typeChar,35);

}

else{

document.getElementById("text").innerHTML+="<br>";

lineIndex++;
charIndex=0;

setTimeout(typeChar,350);

}

}

/* tiup lilin */

function blowCandle(){

document.getElementById("flame").style.display="none";

confettiBurst();

}

/* balas */

function balas(){

const pesan=encodeURIComponent("makasihhh 🎉");

window.location.href="https://wa.me/?text="+pesan;

}

/* confetti */

function confettiBurst(){

for(let i=0;i<150;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=
["#ff7eb3","#ffd166","#7afcff","#cdb4db","#b5ead7"]
[Math.floor(Math.random()*5)];

c.style.animationDuration=(Math.random()*2+2)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),4000);

}

}

/* balon */

function spawnBalloons(){

let icons=["🎈","🎉","✨","🎊"];

for(let i=0;i<20;i++){

let b=document.createElement("div");

b.className="balloon";

b.textContent=icons[Math.floor(Math.random()*icons.length)];

b.style.left=Math.random()*100+"vw";

b.style.animationDuration=(Math.random()*6+6)+"s";

document.body.appendChild(b);

setTimeout(()=>b.remove(),12000);

}

}

</script>

</body>
</html>
